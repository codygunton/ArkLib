name: Lint trailing whitespaces

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-whitespaces:
    name: Lint trailing whitespaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint trailing whitespaces
        run: bash ./scripts/lintWhitespace.sh
