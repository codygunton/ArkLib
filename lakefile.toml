name = "Arklib"
lintDriver = "batteries/runLinter"
defaultTargets = ["ArkLib"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
weak.linter.mathlibStandardSet = true
weak.linter.style.longFile = 1500
weak.linter.style.header = false

[moreServerOptions]
linter.mathlibStandardSet = true
linter.style.longFile = 1500
linter.style.header = false

[[require]]
name = "VCVio"
git = "https://github.com/codygunton/VCV-io"
rev = "a1706e06b8ac28d136609ab9311366413d481efb"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "v4.30.0"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"
rev = "lean4.18.0"

[[require]]
name = "CompPoly"
git = "https://github.com/Verified-zkEVM/CompPoly"
rev = "18c1613e9186c7afa79a4179eea5f4b80d8e9e00"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "ArkLib"
